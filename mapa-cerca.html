<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Cercas - Lista</title>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #container { max-width: 1200px; margin: 0 auto; }
        button { padding: 8px 16px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-warning:hover { background: #e0a800; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Lista de Cercas Cadastradas</h1>
        <button id="nova-cerca">Nova Cerca</button>
        <table id="fences-table" class="display" style="width:100%">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
        </table>
        <p id="token-status">Aguardando token via postMessage...</p>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script>
        let accessToken = null;
        let table;
        const API_BASE = 'https://platform.senior.com.br/t/senior.com.br/bridge/1.0/rest/hcm/pontomobile/entities/fence';
        const PAGE_SIZE = 10;

        // Recebe token via postMessage
        window.addEventListener('message', (event) => {
            if (event.data && event.data.access_token) {
                accessToken = event.data.access_token;
                $('#token-status').text('Token recebido. Carregando dados...').css('color', 'green');
                if (table) {
                    table.ajax.reload();
                } else {
                    initTable();
                }
            }
        });

        function initTable() {
            table = $('#fences-table').DataTable({
                paging: true,
                pageLength: PAGE_SIZE,
                searching: true,
                ordering: true,
                info: true,
                lengthChange: false,
                processing: true,
                serverSide: true,
                ajax: function(data, callback, settings) {
                    const offset = Math.floor(data.start / PAGE_SIZE) * PAGE_SIZE;
                    fetch(`${API_BASE}?offset=${offset}&size=${PAGE_SIZE}&displayfields=name,id`)
                        .then(response => response.json())
                        .then(apiData => {
                            const dtData = {
                                draw: data.draw,
                                recordsTotal: apiData.totalElements || 0,
                                recordsFiltered: apiData.totalElements || 0,
                                data: apiData.contents.map(fence => [
                                    fence.name || 'Sem nome',
                                    `<button class="btn-warning edit-fence" data-id="${fence.id}">Editar</button>
                                     <button class="btn-danger delete-fence" data-id="${fence.id}">Excluir</button>`
                                ])
                            };
                            callback(dtData);
                        })
                        .catch(error => {
                            console.error('Erro ao carregar dados:', error);
                            callback({ data: [], recordsTotal: 0, recordsFiltered: 0 });
                        });
                },
                columns: [
                    { title: 'Nome' },
                    { title: 'Ações', orderable: false }
                ],
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/pt-BR.json'
                }
            });

            // Eventos dos botões
            $('#fences-table tbody').on('click', '.edit-fence', function() {
                const id = $(this).data('id');
                alert(`Editar cerca ID: ${id}\n(Próxima parte: navegar para tela de mapa com dados da cerca)`);
                // Aqui você integraria com a view do mapa, carregando dados da cerca via GET /fence/{id}
            });

            $('#fences-table tbody').on('click', '.delete-fence', function() {
                const id = $(this).data('id');
                if (confirm(`Excluir cerca ${id}?`)) {
                    fetch(`${API_BASE}/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    })
                    .then(() => {
                        table.ajax.reload();
                        alert('Cerca excluída com sucesso!');
                    })
                    .catch(error => {
                        console.error('Erro ao excluir:', error);
                        alert('Erro ao excluir cerca.');
                    });
                }
            });

            $('#nova-cerca').click(() => {
                alert('Nova cerca\n(Próxima parte: navegar para tela de mapa vazia para criar nova)');
                // Aqui você integraria com a view do mapa para nova cerca
            });
        }
    </script>
</body>
</html>
